name: "Setup and test"
description: "Sets up Python, installs dependencies, runs tests, and generates a build version"

inputs:
  python-version:
    description: "Python version to use"
    required: true
    default: "3.14"
  
outputs:
  tests_status:
    description: "Whether the tests passed"
    value: ${{ steps.run_tests.outputs.status }}
  build-version:
    description: "The generated build version"
    value: ${{ steps.set_version.outputs.version }}

runs:
  using: "composite"
  steps:
    - name: Set up Python ${{ inputs.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
        cache: "pip"
        cache-dependency-path: requirements.txt
    
    - name: Install dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run tests
      id: run_tests
      shell: bash
      run: |
        pytest -v --html=report.html --self-contained-html
        echo "status=success" >> "$GITHUB_OUTPUT"

    - name: Set build version 
      id: set_version
      shell: bash
      run: echo "version=1.0.${{ github.run_number }}" >> "$GITHUB_OUTPUT"

    - name: Upload test report artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: pytest-report
        path: report.html