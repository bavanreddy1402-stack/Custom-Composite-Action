name: CI 

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    outputs:
      tests_status: ${{ steps.setup_and_test.outputs.tests_status }}
      build_version: ${{ steps.setup_and_test.outputs.build_version }}
    steps:
      - name: Chekout code 
        uses: actions/checkout@v4
      
      - name: Setup and test
        id: setup_and_test
        uses: ./.github/actions/setup-and-test
        with:
          python-version: "3.14"
  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref=='refs/heads/main' && github.event_name=='push'
    steps:
      - name: Simulate deployment
        run: |
          echo "✅ Tests status: ${{ needs.test.outputs.tests_status }}"
          echo "✅ Deploying version: ${{ needs.test.outputs.build_version }}"

